name: Infra Policy Checks

on:
  pull_request:
    paths:
      - '.github/workflows/infra-policy.yml'
      - 'infra/**'
      - 'frontend/scripts/verify-cloudflare-workers.mjs'
      - 'frontend/package.json'
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/infra-policy.yml'
      - 'infra/**'
      - 'frontend/scripts/verify-cloudflare-workers.mjs'
      - 'frontend/package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cloudrun-contract:
    name: Cloud Run Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Validate Cloud Run config contract
        shell: pwsh
        run: |
          $services = Get-Content 'infra/cloudrun/services.default.json' -Raw | ConvertFrom-Json
          $profile = Get-Content 'infra/cloudrun/profiles.cloudrun-2vcpu.json' -Raw | ConvertFrom-Json
          $serviceNames = @($services.services | ForEach-Object { $_.name })
          $contractNames = @($profile.services.PSObject.Properties.Name)
          $missing = @($contractNames | Where-Object { $_ -notin $serviceNames })
          if ($missing.Count -gt 0) {
            throw "Profile contract references missing services: $($missing -join ', ')"
          }
          foreach ($name in $contractNames) {
            if ($name -notin $profile.rolloutOrder) {
              throw "Rollout order is missing service '$name'."
            }
          }
          Write-Host "Cloud Run service contract verified for: $($contractNames -join ', ')"

      - name: Detect backend sources
        id: detect
        shell: bash
        run: |
          if [ -d backend ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Backend skipped::infra/cloudrun deploy dry-run requires backend/; skipped until compatibility-backend tree is reintroduced."
          fi

      - name: Validate deploy placeholder resolution dry run
        if: steps.detect.outputs.present == 'true'
        shell: pwsh
        run: |
          ./infra/cloudrun/deploy.ps1 `
            -ProjectId 'voiceflow-ci' `
            -Region 'asia-southeast1' `
            -ConfigPath 'infra/cloudrun/services.default.json' `
            -SkipBuild `
            -DryRun `
            -RedisUrl 'redis://ci.example.test:6379/0' `
            -DunoRuntimeUrl 'https://duno.example.test' `
            -VoiceCloneRuntimeUrl 'https://voice-clone.example.test' `
            -VoiceCloneRuntimeToken 'voice-clone-token' `
            -VoiceCloneArtifactSecret 'voice-clone-artifact' `
            -OpenVoiceRuntimeUrl 'https://openvoice.example.test' `
            -OpenVoiceRuntimeToken 'openvoice-token' `
            -OpenVoiceArtifactSecret 'openvoice-artifact'

      - name: Guard OpenVoice placeholder wiring
        shell: pwsh
        run: |
          $script = Get-Content 'infra/cloudrun/deploy.ps1' -Raw
          if ($script -match '__OPENVOICE_RUNTIME_URL__"\s*\{[\s\S]*\$resolved\[\$key\] = \[string\]\$VoiceCloneRuntimeUrl') {
            throw 'OpenVoice runtime placeholder still resolves from VoiceCloneRuntimeUrl.'
          }
          if ($script -match '__OPENVOICE_ARTIFACT_SECRET__"\s*\{[\s\S]*\$resolved\[\$key\] = \[string\]\$VoiceCloneArtifactSecret') {
            throw 'OpenVoice artifact secret placeholder still resolves from VoiceCloneArtifactSecret.'
          }
          Write-Host 'OpenVoice placeholder wiring verified.'

  cloudflare-policy:
    name: Cloudflare Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Verify Cloudflare worker preflight
        env:
          VF_MEDIA_BACKEND_URL: 'https://backend.example.test'
        run: npm --prefix frontend run cloudflare:verify

      - name: Validate site-lock worker structure
        shell: pwsh
        run: |
          if (-not (Test-Path 'infra/cloudflare/site-lock/wrangler.jsonc')) {
            throw 'Missing site-lock wrangler.jsonc'
          }
          if (-not (Test-Path 'infra/cloudflare/site-lock/src/index.js')) {
            throw 'Missing site-lock worker entrypoint'
          }
          $worker = Get-Content 'infra/cloudflare/site-lock/src/index.js' -Raw
          if ($worker -notmatch 'fetch\s*\(') {
            throw 'Site-lock worker must expose a fetch handler.'
          }
          Write-Host 'Site-lock worker structure verified.'
