name: Deploy Backend (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - "infra/cloudrun/docker/**"
      - "infra/cloudrun/services.default.json"
      - "infra/cloudrun/profiles.cloudrun-2vcpu.json"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to deploy (or 'all')"
        required: false
        default: all
      skip_canary:
        description: "Skip staged rollout, deploy 100% immediately"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false # never cancel a backend deploy mid-rollout

permissions:
  contents: read
  id-token: write # OIDC for Workload Identity Federation

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/voiceflow

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      gemini: ${{ steps.filter.outputs.gemini }}
      vertex: ${{ steps.filter.outputs.vertex }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'infra/cloudrun/docker/Dockerfile.backend'
              - 'infra/cloudrun/services.default.json'
            worker:
              - 'infra/cloudrun/docker/Dockerfile.backend-worker'
              - 'infra/cloudrun/services.default.json'
            gemini:
              - 'infra/cloudrun/docker/Dockerfile.gemini-runtime'
            vertex:
              - 'infra/cloudrun/docker/Dockerfile.vertex-text-runtime'

  build-and-deploy:
    name: ${{ matrix.service }}
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: voiceflow-api
            dockerfile: infra/cloudrun/docker/Dockerfile.backend
            changed: ${{ needs.detect-changes.outputs.api == 'true' }}
            ingress: all
          - service: voiceflow-worker
            dockerfile: infra/cloudrun/docker/Dockerfile.backend-worker
            changed: ${{ needs.detect-changes.outputs.worker == 'true' }}
            ingress: internal
          - service: voiceflow-gemini-runtime
            dockerfile: infra/cloudrun/docker/Dockerfile.gemini-runtime
            changed: ${{ needs.detect-changes.outputs.gemini == 'true' }}
            ingress: internal
          - service: voiceflow-vertex-text-runtime
            dockerfile: infra/cloudrun/docker/Dockerfile.vertex-text-runtime
            changed: ${{ needs.detect-changes.outputs.vertex == 'true' }}
            ingress: internal

    steps:
      - name: Skip unchanged
        if: matrix.changed != 'true' && github.event_name != 'workflow_dispatch'
        run: |
          echo "${{ matrix.service }} unchanged — skipping"
          exit 0

      - uses: actions/checkout@v6
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'

      - name: Authenticate to GCP (OIDC / WIF)
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}"
          docker build -t "$IMAGE" -f ${{ matrix.dockerfile }} .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy new revision (no traffic)
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          gcloud run deploy ${{ matrix.service }} \
            --image="${{ env.IMAGE }}" \
            --region=${{ env.GCP_REGION }} \
            --no-traffic \
            --tag=sha-${GITHUB_SHA::7} \
            --quiet

      - name: Staged rollout (10 → 50 → 100)
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && !inputs.skip_canary
        run: bash infra/cloudrun/rollout-traffic.sh ${{ matrix.service }} sha-${GITHUB_SHA::7} ${{ env.GCP_REGION }}

      - name: Full rollout (skip canary)
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && inputs.skip_canary
        run: |
          gcloud run services update-traffic ${{ matrix.service }} \
            --region=${{ env.GCP_REGION }} \
            --to-tags=sha-${GITHUB_SHA::7}=100 \
            --quiet
