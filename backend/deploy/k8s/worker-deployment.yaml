apiVersion: apps/v1
kind: Deployment
metadata:
  name: voiceflow-worker
  namespace: voiceflow
spec:
  replicas: 4
  selector:
    matchLabels:
      app: voiceflow-worker
  template:
    metadata:
      labels:
        app: voiceflow-worker
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: worker
          image: ghcr.io/voiceflow/backend-worker:latest
          imagePullPolicy: Always
          command: ["python", "-m", "workers.tts_worker"]
          env:
            - name: VF_SERVICE_ROLE
              value: "worker"
            - name: VF_ENV
              value: "production"
            - name: VF_TTS_QUEUE_ENABLED
              value: "1"
            - name: VF_TTS_QUEUE_WORKER_COUNT
              value: "8"
            - name: VF_TTS_QUEUE_SYNC_WAIT_MS
              value: "0"
            - name: VF_DEV_UID_HEADER_ENABLED
              value: "0"
            - name: VF_ENABLE_DEV_ADMIN_LOGIN
              value: "0"
          envFrom:
            - configMapRef:
                name: voiceflow-backend-config
            - secretRef:
                name: voiceflow-redis
            - secretRef:
                name: voiceflow-firebase
            - secretRef:
                name: voiceflow-reader-storage
            - secretRef:
                name: voiceflow-runtime-admin
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-lc", "sleep 10"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voiceflow-worker-hpa
  namespace: voiceflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voiceflow-worker
  minReplicas: 4
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
