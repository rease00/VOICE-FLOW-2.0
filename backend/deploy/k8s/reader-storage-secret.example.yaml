apiVersion: v1
kind: Secret
metadata:
  name: voiceflow-reader-storage
  namespace: voiceflow
type: Opaque
stringData:
  # Cloudflare R2 credentials for reader uploads, cached assets, and exports.
  # The backend auto-selects R2 when these are present and VF_READER_STORAGE_BACKEND=auto.
  R2_ACCOUNT_ID: "replace_me"
  R2_ACCESS_KEY_ID: "replace_me"
  R2_SECRET_ACCESS_KEY: "replace_me"
  R2_BUCKET_NAME: "replace_me"
