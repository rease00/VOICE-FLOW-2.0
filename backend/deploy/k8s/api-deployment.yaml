apiVersion: apps/v1
kind: Deployment
metadata:
  name: voiceflow-api
  namespace: voiceflow
spec:
  replicas: 3
  selector:
    matchLabels:
      app: voiceflow-api
  template:
    metadata:
      labels:
        app: voiceflow-api
    spec:
      containers:
        - name: api
          image: ghcr.io/voiceflow/backend-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: VF_SERVICE_ROLE
              value: "api"
            - name: VF_ENV
              value: "production"
            - name: VF_TTS_QUEUE_WORKER_COUNT
              value: "0"
            - name: VF_AUTH_ENFORCE
              value: "1"
            - name: VF_DEV_UID_HEADER_ENABLED
              value: "0"
            - name: VF_ENABLE_DEV_ADMIN_LOGIN
              value: "0"
          command:
            - python
            - -m
            - uvicorn
            - app:app
            - --app-dir
            - .
            - --host
            - 0.0.0.0
            - --port
            - "7800"
          ports:
            - containerPort: 7800
              name: http
          envFrom:
            - configMapRef:
                name: voiceflow-backend-config
            - secretRef:
                name: voiceflow-redis
            - secretRef:
                name: voiceflow-runtime-admin
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: voiceflow-api
  namespace: voiceflow
spec:
  selector:
    app: voiceflow-api
  ports:
    - port: 7800
      targetPort: http
      protocol: TCP
      name: http
