apiVersion: apps/v1
kind: Deployment
metadata:
  name: voiceflow-api
  namespace: voiceflow
spec:
  replicas: 3
  selector:
    matchLabels:
      app: voiceflow-api
  template:
    metadata:
      labels:
        app: voiceflow-api
    spec:
      containers:
        - name: api
          image: ghcr.io/voiceflow/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "app.py"]
          ports:
            - containerPort: 7800
              name: http
          envFrom:
            - configMapRef:
                name: voiceflow-backend-config
            - secretRef:
                name: voiceflow-redis
            - secretRef:
                name: voiceflow-runtime-admin
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: voiceflow-api
  namespace: voiceflow
spec:
  selector:
    app: voiceflow-api
  ports:
    - port: 7800
      targetPort: http
      protocol: TCP
      name: http
