apiVersion: v1
kind: ConfigMap
metadata:
  name: voiceflow-backend-config
  namespace: voiceflow
data:
  VF_AUTH_ENFORCE: "1"
  VF_TTS_QUEUE_ENABLED: "1"
  VF_TTS_QUEUE_SYNC_WAIT_MS: "3000"
  VF_TTS_QUEUE_JOB_TTL_MS: "300000"
  VF_TTS_QUEUE_WORKER_COUNT: "6"
  VF_TTS_ENGINE_CONCURRENCY_GEM: "12"
  VF_TTS_ENGINE_CONCURRENCY_KOKORO: "8"
  VF_TTS_GATEWAY_MAX_ACTIVE: "150"
  VF_TTS_GATEWAY_QUEUE_MAX: "1000"
  VF_TTS_QUEUE_MAX_DEPTH: "20000"
  VF_GEMINI_RUNTIME_URL: "http://voiceflow-gemini-runtime.voiceflow.svc.cluster.local:7810"
  VF_KOKORO_RUNTIME_URL: "http://voiceflow-kokoro-runtime.voiceflow.svc.cluster.local:7820"

