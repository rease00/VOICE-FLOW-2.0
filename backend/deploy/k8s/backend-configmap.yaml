apiVersion: v1
kind: ConfigMap
metadata:
  name: voiceflow-backend-config
  namespace: voiceflow
data:
  VF_SERVICE_ROLE: "api"
  VF_ENV: "production"
  VF_AUTH_ENFORCE: "1"
  VF_DEV_UID_HEADER_ENABLED: "0"
  VF_ENABLE_DEV_ADMIN_LOGIN: "0"
  VF_TTS_QUEUE_ENABLED: "1"
  VF_TTS_QUEUE_SYNC_WAIT_MS: "1200"
  VF_TTS_GATEWAY_QUEUE_WAIT_TIMEOUT_MS: "9000"
  VF_TTS_QUEUE_JOB_TTL_MS: "300000"
  VF_TTS_QUEUE_RESULT_TTL_MS: "900000"
  VF_TTS_V2_REQUEST_MAX_BODY_BYTES: "524288"
  VF_TTS_JOB_INLINE_RESULT_MAX_BYTES: "1048576"
  VF_TTS_QUEUE_WORKER_COUNT: "8"
  VF_TTS_WORKER_HEALTH_MAX_STALE_MS: "60000"
  VF_TTS_ENGINE_CONCURRENCY_GEM: "16"
  VF_TTS_ENGINE_CONCURRENCY_DUNO: "12"
  VF_TTS_RUNTIME_TIMEOUT_SEC: "240"
  VF_TTS_LIVE_FIRST_CHUNK_TARGET_MS: "20000"
  VF_TTS_LIVE_NATIVE_FALLBACK_MODE: "native_audio_only"
  VF_TTS_LIVE_NATIVE_PER_TURN_TIMEOUT_SEC: "20"
  VF_TTS_LIVE_NATIVE_FIRST_CHUNK_TEXT_TIMEOUT_SEC: "12"
  VF_TTS_LIVE_NATIVE_FIRST_CHUNK_SYNTH_TIMEOUT_SEC: "20"
  VF_TTS_LIVE_NATIVE_POST_DEADLINE_TIMEOUT_SEC: "3"
  VF_TTS_GATEWAY_MAX_ACTIVE: "150"
  VF_TTS_GATEWAY_QUEUE_MAX: "1000"
  VF_TTS_QUEUE_KEY_PREFIX: "vf:tts:v2:jobs"
  VF_TTS_QUEUE_MAX_DEPTH: "20000"
  VF_TTS_QUEUE_MAX_QUEUED_PER_USER: "40"
  VF_TTS_QUEUE_MAX_QUEUED_PER_LANE: "12000"
  VF_TTS_QUEUE_MIRROR_MAX_JOBS: "1000"
  VF_TTS_QUEUE_RESERVE_ANOMALY_TTL_SEC: "86400"
  VF_TTS_QUEUE_MAX_RECOVERY_ATTEMPTS: "3"
  VF_TTS_QUEUE_RETRY_AFTER_SECONDS: "2"
  VF_BILLING_WEBHOOK_MAX_BODY_BYTES: "262144"
  VF_BILLING_WEBHOOK_PROCESSING_LEASE_SECONDS: "900"
  VF_AI_OPS_CONCURRENCY_SOFT_LIMIT: "8"
  VF_AI_OPS_CONCURRENCY_HARD_LIMIT: "12"
  VF_TTS_WORKER_IDLE_SLEEP_MS: "250"
  VF_GEMINI_RUNTIME_URL: "http://voiceflow-gemini-runtime.voiceflow.svc.cluster.local:7810"
  VF_DUNO_RUNTIME_URL: "https://your-duno-modal-endpoint"
  VF_OPENVOICE_RUNTIME_URL: "https://your-openvoice-modal-endpoint"
  VF_WHISPER_DEVICE: "cpu"
  VF_WHISPER_COMPUTE: "int8"
  CUDA_VISIBLE_DEVICES: ""
  VF_DUNO_RUNTIME_TOKEN: ""
  VF_OPENVOICE_RUNTIME_TOKEN: ""
  VF_OPENVOICE_ARTIFACT_SECRET: ""
