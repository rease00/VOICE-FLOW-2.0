apiVersion: v1
kind: Secret
metadata:
  name: voiceflow-firebase
  namespace: voiceflow
type: Opaque
stringData:
  # Recommended live deploy path: store the Firebase Admin SDK JSON here.
  # The backend reads this from FIREBASE_SERVICE_ACCOUNT_JSON and can initialize
  # Firebase Auth + Firestore directly from the JSON payload.
  # If you prefer a mounted file instead, use GOOGLE_APPLICATION_CREDENTIALS
  # in a custom volume-mount setup and leave this field empty.
  FIREBASE_SERVICE_ACCOUNT_JSON: |
    {
      "type": "service_account",
      "project_id": "replace_me",
      "private_key_id": "replace_me",
      "private_key": "<paste_json_escaped_private_key_here>",
      "client_email": "replace_me@replace_me.iam.gserviceaccount.com",
      "client_id": "replace_me",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": "replace_me"
    }
