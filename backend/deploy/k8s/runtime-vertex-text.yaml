apiVersion: apps/v1
kind: Deployment
metadata:
  name: voiceflow-vertex-text-runtime
  namespace: voiceflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voiceflow-vertex-text-runtime
  template:
    metadata:
      labels:
        app: voiceflow-vertex-text-runtime
    spec:
      containers:
        - name: vertex-text-runtime
          image: ghcr.io/voiceflow/vertex-text-runtime:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - uvicorn
            - app:app
            - --app-dir
            - engines/vertex-text-runtime
            - --host
            - 0.0.0.0
            - --port
            - "7820"
          envFrom:
            - configMapRef:
                name: voiceflow-backend-config
            - secretRef:
                name: voiceflow-runtime-admin
          env:
            - name: VF_RUNTIME_NAME
              value: vertex-text-runtime
            - name: VF_RUNTIME_ROLE
              value: text_only
            - name: VF_RUNTIME_FORCE_AUTH_MODE
              value: vertex
          ports:
            - containerPort: 7820
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: voiceflow-vertex-text-runtime
  namespace: voiceflow
spec:
  selector:
    app: voiceflow-vertex-text-runtime
  ports:
    - name: http
      port: 7820
      targetPort: http
