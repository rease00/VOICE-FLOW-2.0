apiVersion: apps/v1
kind: Deployment
metadata:
  name: voiceflow-kokoro-runtime
  namespace: voiceflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voiceflow-kokoro-runtime
  template:
    metadata:
      labels:
        app: voiceflow-kokoro-runtime
    spec:
      containers:
        - name: kokoro-runtime
          image: ghcr.io/voiceflow/kokoro-runtime:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "app.py"]
          ports:
            - containerPort: 7820
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: voiceflow-kokoro-runtime
  namespace: voiceflow
spec:
  selector:
    app: voiceflow-kokoro-runtime
  ports:
    - name: http
      port: 7820
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voiceflow-kokoro-runtime-hpa
  namespace: voiceflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voiceflow-kokoro-runtime
  minReplicas: 2
  maxReplicas: 16
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

