apiVersion: v1
kind: Secret
metadata:
  name: voiceflow-runtime-admin
  namespace: voiceflow
type: Opaque
stringData:
  # Shared admin token used by media-backend and gemini-runtime admin endpoints.
  GEMINI_RUNTIME_ADMIN_TOKEN: "replace_with_strong_runtime_admin_token"
  # DeepInfra API token for ResembleAI/chatterbox-turbo (or your configured DUNO model).
  VF_DUNO_RUNTIME_TOKEN: "replace_with_deepinfra_api_token"
  VF_OPENVOICE_MODAL_RUNTIME_TOKEN: "replace_with_openvoice_modal_token_if_private"
  VF_OPENVOICE_RUNTIME_TOKEN: "replace_with_openvoice_modal_token_if_private"
  VF_OPENVOICE_ARTIFACT_SECRET: "replace_with_openvoice_artifact_signing_secret"
