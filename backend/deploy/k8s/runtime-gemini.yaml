apiVersion: apps/v1
kind: Deployment
metadata:
  name: voiceflow-gemini-runtime
  namespace: voiceflow
spec:
  replicas: 3
  selector:
    matchLabels:
      app: voiceflow-gemini-runtime
  template:
    metadata:
      labels:
        app: voiceflow-gemini-runtime
    spec:
      containers:
        - name: gemini-runtime
          image: ghcr.io/voiceflow/gemini-runtime:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "app.py"]
          ports:
            - containerPort: 7810
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "750m"
              memory: "2Gi"
            limits:
              cpu: "3000m"
              memory: "6Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: voiceflow-gemini-runtime
  namespace: voiceflow
spec:
  selector:
    app: voiceflow-gemini-runtime
  ports:
    - name: http
      port: 7810
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voiceflow-gemini-runtime-hpa
  namespace: voiceflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voiceflow-gemini-runtime
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

