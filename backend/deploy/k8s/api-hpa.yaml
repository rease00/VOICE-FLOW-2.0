apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voiceflow-api-hpa
  namespace: voiceflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voiceflow-api
  minReplicas: 3
  maxReplicas: 25
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

