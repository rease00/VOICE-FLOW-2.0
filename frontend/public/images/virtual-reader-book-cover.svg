<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">The Lighthouse Ledger Cover</title>
  <desc id="desc">Virtual demo book cover used for Reader landing chapter demos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1c38" />
      <stop offset="58%" stop-color="#10294f" />
      <stop offset="100%" stop-color="#1a375f" />
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(250,234,176,0)" />
      <stop offset="35%" stop-color="rgba(250,234,176,0.68)" />
      <stop offset="100%" stop-color="rgba(250,234,176,0.08)" />
    </linearGradient>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)" rx="34" ry="34" />

  <g opacity="0.2">
    <circle cx="780" cy="130" r="170" fill="#6ed5f7" />
    <circle cx="120" cy="1080" r="220" fill="#4f8ad9" />
  </g>

  <text x="90" y="130" fill="#83d9f7" font-size="32" font-family="Georgia, 'Times New Roman', serif" letter-spacing="5" font-weight="700">VIRTUAL DEMO BOOK</text>
  <text x="90" y="240" fill="#f6f8ff" font-size="78" font-family="Georgia, 'Times New Roman', serif" font-weight="700">The Lighthouse</text>
  <text x="90" y="320" fill="#f6f8ff" font-size="78" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Ledger</text>
  <text x="92" y="382" fill="#bdd6f3" font-size="34" font-family="Georgia, 'Times New Roman', serif">A two-chapter landing demo</text>

  <g transform="translate(220,420)">
    <rect width="180" height="450" fill="#f2f4f9" opacity="0.12" />
    <polygon points="90,0 180,450 0,450" fill="#f2f4f9" opacity="0.32" />
    <rect x="62" y="106" width="56" height="180" fill="#f6f8ff" />
    <rect x="76" y="128" width="28" height="110" fill="#0a1f3f" />
    <ellipse cx="90" cy="270" rx="72" ry="22" fill="#0a1730" opacity="0.46" />
  </g>

  <polygon points="306,568 840,448 840,692 306,802" fill="url(#beam)" />

  <rect x="92" y="960" width="716" height="170" rx="22" ry="22" fill="rgba(4,12,24,0.44)" stroke="rgba(189,214,243,0.34)" />
  <text x="126" y="1025" fill="#f6f8ff" font-size="36" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Chapter 1: Fog Over Meridian Bay</text>
  <text x="126" y="1082" fill="#bdd6f3" font-size="30" font-family="Georgia, 'Times New Roman', serif">Chapter 2: The Second Signal</text>
</svg>
